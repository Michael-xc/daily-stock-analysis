name: 每日股票分析

on:
  schedule:
    - cron: '30 9 * * 1-5'     # 周一到周五,UTC 09:30 = 北京 17:30
  
  workflow_dispatch:
    inputs:
      mode:
        description: '模式'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - market-only
          - stocks-only
      force_run:
        description: '强制运行(跳过交易日检查)'
        required: false
        default: false
        type: boolean

concurrency:
  group: stock-analysis
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Random sleep
        run: sleep $((RANDOM % 60))
      
      - name: Checkout
        uses: actions/checkout@v5
      
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Create directories
        run: mkdir -p data logs reports
      
      - name: Run stock analysis
        run: python main.py

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: analysis-reports-${{ github.run_number }}
          path: reports/ logs/
          retention-days: 30
