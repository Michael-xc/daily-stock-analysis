name: Daily Stock Analysis

on:
  push:
    branches: [main]
  schedule:
    - cron: '30 9 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: 'mode'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - market-only
          - stocks-only
      force_run:
        description: 'force'
        required: false
        default: false
        type: boolean

concurrency:
  group: stock-analysis
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run setup
        run: mkdir -p data logs reports
      
      - name: Configure environment
        env:
          LITELLM_MODEL: ${{ vars.LITELLM_MODEL || secrets.LITELLM_MODEL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || secrets.OPENAI_BASE_URL }}
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_WEBHOOK_SECRET: ${{ secrets.FEISHU_WEBHOOK_SECRET }}
          TAVILY_API_KEYS: ${{ secrets.TAVILY_API_KEYS }}
          STOCK_LIST: ${{ vars.STOCK_LIST || secrets.STOCK_LIST || '600519' }}
          LOG_LEVEL: INFO
          MAX_WORKERS: ${{ vars.MAX_WORKERS || secrets.MAX_WORKERS || '1' }}
        run: |
          echo "=========================================="
          echo "Configuration"
          echo "=========================================="
          echo "Time: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          echo "Mode: ${{ github.event.inputs.mode || 'full' }}"
          echo "Stock List: $STOCK_LIST"
          echo "AI Provider:"
          echo "  LiteLLM Model: $LITELLM_MODEL"
          echo "  OpenAI API Key: $([ -n "$OPENAI_API_KEY" ] && echo '✓ configured' || echo '✗ missing')"
          echo "  OpenAI Base URL: $([ -n "$OPENAI_BASE_URL" ] && echo '✓ configured' || echo '✗ missing')"
          
          MODE="${{ github.event.inputs.mode || 'full' }}"
          FORCE_RUN_ARG=""
          if [ "${{ github.event.inputs.force_run }}" = "true" ]; then
            FORCE_RUN_ARG="--force-run"
          fi

          if [ "$MODE" = "market-only" ]; then
            python main.py --market-review $FORCE_RUN_ARG
          elif [ "$MODE" = "stocks-only" ]; then
            python main.py --no-market-review $FORCE_RUN_ARG
          else
            python main.py $FORCE_RUN_ARG
          fi
      
      - name: Upload reports
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: analysis-reports-${{ github.run_number }}
          path: |
            reports/
            logs/
          retention-days: 30
      
      - name: Final status
        if: always()
        run: |
          echo ""
          echo "=========================================="
          echo "Run Complete"
          echo "=========================================="
          if [ -d "reports" ] && [ "$(ls -A reports 2>/dev/null)" ]; then
            echo "Reports generated:"
            ls -la reports/
          else
            echo "No reports found."
          fi
